<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TP JS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      letter-spacing: 0.05em;
      margin-bottom: 30px;
    }

    #mealList {
      list-style: none;
      text-align: left;
    }

    #mealList li {
      padding: 10px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    #mealList button {
      padding: 5px 15px;
      background: #6c5ce7;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #mealList button:hover {
      background: #7f6ff0;
    }
    #historyList {
      list-style: none;
      text-align: left;
      margin-top: 10px;
    }

    #historyList li {
      padding: 10px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
    }
    
    .delete-btn {
      background: #e74c3c !important;
    }
    .delete-btn:hover {
      background: #c0392b !important;
    }

    .section {
      margin-bottom: 40px;
      background: rgba(0, 0, 0, 0.2);
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>TP JS</h1>
    
    <div class="section">
      <h2>Mon Profil</h2>
      <p id="walletDisplay">Portefeuille : Chargement...</p>
      <p id="totalSpentDisplay">Total dépensé : Chargement...</p>
    </div>

    <div class="section">
      <h2>Menu</h2>
      <ul id="mealList"></ul>
    </div>
    
    <div class="section">
      <h2>Historique des Commandes</h2>
      <ul id="historyList"></ul>
    </div>
  </div>
  <script type="module" src="dist/app.js"></script>
</body>

</html>
